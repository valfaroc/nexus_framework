services:
  nexus-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.webots
    image: nexus/webots:R2023b
    container_name: nexus_webots
    environment:
      - DISPLAY=${DISPLAY}
      - WEBOTS_HOME=/usr/local/webots
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe
      - XAUTHORITY=/root/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - ./simulators/webots/worlds:/nexus/worlds
      - .:/nexus
    ports:
      - "1234:1234"
    networks:
      - nexus_net
    command: bash -c "webots --mode=real-time /nexus/worlds/simple_road.wbt"
  nexus-ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2
    image: nexus/ros2:humble
    container_name: nexus_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/nexus
      - WEBOTS_SERVER=nexus_webots:1234
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      - .:/nexus
    working_dir: /nexus
    depends_on:
      - nexus-sim
    networks:
      - nexus_net
    command: bash -c "source /opt/ros/humble/setup.bash && echo '✅ Nexus ROS2 container ready' && echo 'Waiting 12s for Webots to load...' && sleep 12 && python3 /nexus/simulators/webots/extern_controller.py"

networks:
  nexus_net:
    driver: bridge
