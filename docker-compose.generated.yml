services:
  nexus-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.webots
    image: nexus/webots:R2023b
    container_name: nexus_webots
    environment:
      - DISPLAY=${DISPLAY}
      - WEBOTS_HOME=/usr/local/webots
      - ROS_DOMAIN_ID=0
      - XAUTHORITY=/root/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - ./simulators/webots/worlds:/nexus/worlds
      - .:/nexus
    networks:
      - nexus_net
    command: bash -c "source /opt/ros/humble/setup.bash && echo '[nexus_webots] Starting Webots...' && webots /nexus/worlds/simple_road.wbt & sleep 10 && echo '[nexus_webots] Starting extern controller' && python3 /nexus/simulators/webots/extern_controller.py"
  nexus-ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2
    image: nexus/ros2:humble
    container_name: nexus_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/nexus
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      - .:/nexus
    working_dir: /nexus
    depends_on:
      - nexus-sim
    networks:
      - nexus_net
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               echo '✅ Nexus ROS2 container ready — run: nexus run --config <your_project>/nexus.yaml' &&
               tail -f /dev/null"

networks:
  nexus_net:
    driver: bridge
