services:
  nexus-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.webots
    image: nexus/webots:R2023b
    container_name: nexus_webots
    environment:
      - DISPLAY=${DISPLAY}
      - WEBOTS_HOME=/usr/local/webots
      - ROS_DOMAIN_ID=0
      - XAUTHORITY=/root/.Xauthority
      - WEBOTS_DISABLE_SAVE_PERSPECTIVE_ON_CLOSE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - ./simulators/webots/worlds:/nexus/worlds:ro
      - .:/nexus
    networks:
      - nexus_net
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               webots --no-sandbox --stdout --stderr
                      --batch /nexus/worlds/simple_road.wbt &
               WEBOTS_PID=$$!
               echo 'Waiting for Webots to load...' &&
               sleep 8 &&
               echo '✅ Webots ready, starting controller' &&
               python3 /nexus/simulators/webots/extern_controller.py"
  nexus-ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2
    image: nexus/ros2:humble
    container_name: nexus_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/nexus
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      - .:/nexus
    working_dir: /nexus
    depends_on:
      - nexus-sim
    networks:
      - nexus_net
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               echo '✅ Nexus ROS2 container ready — run: nexus run --config <your_project>/nexus.yaml' &&
               tail -f /dev/null"

networks:
  nexus_net:
    driver: bridge
