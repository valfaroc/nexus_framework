services:
  nexus-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.webots
    image: nexus/webots:R2023b
    container_name: nexus_webots
    environment:
      - DISPLAY=${DISPLAY}
      - WEBOTS_HOME=/usr/local/webots
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./simulators/webots/worlds:/nexus/worlds:ro
      - .:/nexus
    networks:
      - nexus_net
    command: >
      bash -c "Xvfb :99 -screen 0 1280x1024x24 &
               export DISPLAY=:99 &&
               webots --mode=fast --batch /nexus/worlds/simple_road.wbt"
  nexus-ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2
    image: nexus/ros2:humble
    container_name: nexus_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/nexus
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      - .:/nexus
    working_dir: /nexus
    depends_on:
      - nexus-sim
    networks:
      - nexus_net
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               echo '✅ Nexus ROS2 container ready' &&
               python3 -m nexus.cli.main run --config /nexus/nexus.yaml"

networks:
  nexus_net:
    driver: bridge
